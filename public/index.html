<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#212529" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="piniMqtt4KNX" />
  <title>piniMqtt4KNX – Dashboard</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="apple-touch-icon" href="/favicon.svg" />
  <link rel="manifest" href="/manifest.json" />
  <!-- Restore theme before first paint to avoid flash -->
  <script>
    (function () {
      const t = localStorage.getItem('theme');
      if (t === 'dark' || (!t && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.setAttribute('data-bs-theme', 'dark');
      }
    })();
  </script>
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
    integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN"
    crossorigin="anonymous"
  />
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    crossorigin="anonymous"
  />
  <style>
    .badge-status { font-size: 0.85rem; padding: 0.4em 0.75em; }
    #traffic-body tr td:first-child {
      font-family: monospace; white-space: nowrap; font-size: 0.8rem;
    }
    .direction-knx  { color: #0d6efd; font-weight: 600; }
    .direction-mqtt { color: #198754; font-weight: 600; }
    #log-wrapper { max-height: 60vh; overflow-y: auto; }
    .table-sm td, .table-sm th { vertical-align: middle; }
    #ga-table td { font-size: 0.9rem; }
    .empty-msg { color: #6c757d; font-style: italic; }
    tr.unconfigured td { color: #6c757d; }
    tr.known-ga { background-color: rgba(13, 110, 253, 0.13); }
    tr.known-ga td:first-child { border-left: 3px solid rgba(13, 110, 253, 0.5); }
    /* Sort indicators via pseudo-element – prevents column-width shifts */
    th[data-sort] { cursor: pointer; user-select: none; white-space: nowrap; }
    th[data-sort]::after { content: '\00a0\00a0'; }
    th[data-sort][data-dir="asc"]::after  { content: ' \2191'; }
    th[data-sort][data-dir="desc"]::after { content: ' \2193'; }
    th[data-sort]:hover { --bs-table-accent-bg: rgba(255,255,255,0.2); }
    /* Fixed column widths for GA table */
    #ga-table { table-layout: fixed; }
    #ga-table col.col-addr    { width: 7rem; }
    #ga-table col.col-name    { width: 22%; }
    #ga-table col.col-dpt     { width: 4.5rem; }
    #ga-table col.col-comment { }
    #ga-table col.col-lastval { width: 7rem; }
    #ga-table col.col-actions { width: 5.5rem; }
    #ga-table td, #ga-table th { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-dark bg-dark mb-4">
  <div class="container-fluid">
    <span class="navbar-brand fw-bold">⚡ piniMqtt4KNX</span>
    <div class="d-flex gap-2 align-items-center">
      <span id="knx-badge"  class="badge bg-secondary badge-status">KNX: …</span>
      <span id="mqtt-badge" class="badge bg-secondary badge-status">MQTT: …</span>
      <button class="btn btn-sm btn-outline-light" id="btn-dark-mode" title="Toggle dark mode" aria-label="Toggle dark mode">
        <i class="bi bi-moon-fill" id="dark-mode-icon"></i>
      </button>
    </div>
  </div>
</nav>

<div class="container-fluid px-4">

  <!-- Group Addresses card -->
  <div class="row mb-4">
    <div class="col-12 col-xl-5">
      <div class="card shadow-sm h-100">
        <div class="card-header d-flex justify-content-between align-items-center fw-semibold">
          Configured Group Addresses
          <div class="d-flex gap-2">
            <button class="btn btn-sm btn-outline-success" id="btn-import-ga">⬆ Import</button>
            <input type="file" id="ga-import-file" accept=".xml" class="d-none">
            <button class="btn btn-sm btn-success" id="btn-add-ga">+ Add</button>
          </div>
        </div>
        <div class="card-body p-0">
          <div class="table-responsive">
            <table class="table table-sm table-striped mb-0" id="ga-table">
              <colgroup>
                <col class="col-addr">
                <col class="col-name">
                <col class="col-dpt">
                <col class="col-comment">
                <col class="col-lastval">
                <col class="col-actions">
              </colgroup>
              <thead class="table-dark">
                <tr>
                  <th data-sort="address">Address</th>
                  <th data-sort="name"   >Name</th>
                  <th data-sort="dpt"    >DPT</th>
                  <th data-sort="comment">Comment</th>
                  <th>Last Value</th>
                  <th></th>
                </tr>
              </thead>
              <tbody id="ga-body">
                <tr><td colspan="6" class="text-center empty-msg p-3">Loading…</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <!-- Stats -->
    <div class="col-12 col-xl-7 mt-3 mt-xl-0">
      <div class="row g-3 h-100">
        <div class="col-6">
          <div class="card shadow-sm text-center py-3">
            <div class="card-body">
              <h2 class="display-5 fw-bold text-primary" id="cnt-total">0</h2>
              <p class="mb-0 text-muted">Total telegrams</p>
            </div>
          </div>
        </div>
        <div class="col-6">
          <div class="card shadow-sm text-center py-3">
            <div class="card-body">
              <h2 class="display-5 fw-bold text-success" id="cnt-knx2mqtt">0</h2>
              <p class="mb-0 text-muted">KNX → MQTT</p>
            </div>
          </div>
        </div>
        <div class="col-6">
          <div class="card shadow-sm text-center py-3">
            <div class="card-body">
              <h2 class="display-5 fw-bold text-info" id="cnt-mqtt2knx">0</h2>
              <p class="mb-0 text-muted">MQTT → KNX</p>
            </div>
          </div>
        </div>
        <div class="col-6">
          <div class="card shadow-sm text-center py-3">
            <div class="card-body">
              <h2 class="display-5 fw-bold text-warning" id="cnt-last-val">–</h2>
              <p class="mb-0 text-muted">Last value</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Traffic Log card -->
  <div class="card shadow-sm mb-4">
    <div class="card-header d-flex justify-content-between align-items-center">
      <span class="fw-semibold">Live Traffic Log</span>
      <button class="btn btn-sm btn-outline-secondary" id="btn-clear">Clear</button>
    </div>
    <div class="card-body p-0">
      <div id="log-wrapper">
        <table class="table table-sm table-hover mb-0">
          <thead class="table-dark sticky-top">
            <tr>
              <th>Timestamp</th>
              <th>Direction</th>
              <th>Name / Address</th>
              <th>MQTT Topic</th>
              <th>Value</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="traffic-body">
            <tr><td colspan="6" class="text-center empty-msg p-3">Waiting for traffic…</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

</div><!-- /container -->

<!-- Add / Edit Group Address Modal -->
<div class="modal fade" id="gaModal" tabindex="-1" aria-labelledby="gaModalTitle" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="gaModalTitle">Add Group Address</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <div id="ga-form-error" class="alert alert-danger d-none"></div>
        <div class="mb-3">
          <label for="ga-address" class="form-label">Address <span class="text-danger">*</span></label>
          <input type="text" class="form-control" id="ga-address" placeholder="e.g. 9/0/1">
        </div>
        <div class="mb-3">
          <label for="ga-name" class="form-label">Name</label>
          <input type="text" class="form-control" id="ga-name" placeholder="e.g. Living Room Light">
        </div>
        <div class="mb-3">
          <label for="ga-dpt" class="form-label">DPT</label>
          <input type="text" class="form-control" id="ga-dpt" placeholder="e.g. 1.001">
        </div>
        <div class="mb-3">
          <label for="ga-comment" class="form-label">Comment</label>
          <input type="text" class="form-control" id="ga-comment" placeholder="Optional note">
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-primary" id="btn-save-ga">Save</button>
      </div>
    </div>
  </div>
</div>

<script
  src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
  integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL"
  crossorigin="anonymous"
></script>
<script src="/socket.io/socket.io.js"></script>
<script>
  const socket = io();

  // ── Helpers ─────────────────────────────────────────────────────────────────
  function escHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  /** Format a decoded value for display, adding units based on DPT. */
  function formatValue(value, dpt) {
    if (!dpt) return String(value);
    const [major, minor] = String(dpt).split('.');
    if (major === '1') return value; // semantic label already assigned by server
    if (major === '9') {
      const unit = minor === '001' ? ' °C'
                 : minor === '002' ? ' K'
                 : minor === '003' ? ' °C/h'
                 : minor === '004' ? ' lux'
                 : minor === '005' ? ' m/s'
                 : minor === '006' ? ' Pa'
                 : minor === '007' ? ' %'
                 : minor === '008' ? ' ppm'
                 : '';
      return value + unit;
    }
    return String(value);
  }

  // ── Counters ─────────────────────────────────────────────────────────────────
  let total = 0, knx2mqtt = 0, mqtt2knx = 0;

  function updateCounters(entry) {
    total++;
    if (entry.direction === 'KNX→MQTT') knx2mqtt++;
    if (entry.direction === 'MQTT→KNX') mqtt2knx++;
    document.getElementById('cnt-total').textContent    = total;
    document.getElementById('cnt-knx2mqtt').textContent = knx2mqtt;
    document.getElementById('cnt-mqtt2knx').textContent = mqtt2knx;
    document.getElementById('cnt-last-val').textContent = formatValue(entry.value, entry.dpt);
  }

  // ── Traffic rows ──────────────────────────────────────────────────────────────
  const tbody = document.getElementById('traffic-body');
  let hasRows = false;

  function appendRow(entry) {
    if (!hasRows) { tbody.innerHTML = ''; hasRows = true; }
    const ts       = new Date(entry.timestamp).toLocaleTimeString();
    const dirClass = entry.direction === 'KNX→MQTT' ? 'direction-knx' : 'direction-mqtt';
    const isConf   = entry.configured !== false;
    const tr       = document.createElement('tr');
    if (!isConf) tr.classList.add('unconfigured');
    else         tr.classList.add('known-ga');
    tr.innerHTML = `
      <td>${escHtml(ts)}</td>
      <td><span class="${dirClass}">${escHtml(entry.direction)}</span></td>
      <td>
        ${isConf ? escHtml(entry.name || entry.address) : '<em>' + escHtml(entry.address) + '</em>'}
        <br><small class="text-muted">${escHtml(entry.address)}</small>
      </td>
      <td><code>${escHtml(entry.topic)}</code></td>
      <td><strong>${escHtml(formatValue(String(entry.value), entry.dpt))}</strong></td>
      <td>${!isConf ? '<button class="btn btn-sm btn-outline-primary btn-add-from-traffic" data-address="' + escHtml(entry.address) + '">+ Add</button>' : ''}</td>
    `;
    tbody.prepend(tr);
    while (tbody.rows.length > 200) tbody.deleteRow(tbody.rows.length - 1);
  }

  // Delegate "Add to config" clicks from the traffic log
  tbody.addEventListener('click', (e) => {
    const btn = e.target.closest('.btn-add-from-traffic');
    if (btn) openModal(btn.dataset.address);
  });

  // ── Status badges ─────────────────────────────────────────────────────────────
  function updateBadge(service, connected) {
    const el = document.getElementById(service.toLowerCase() + '-badge');
    if (!el) return;
    el.textContent = `${service}: ${connected ? 'Connected' : 'Disconnected'}`;
    el.className = `badge badge-status ${connected ? 'bg-success' : 'bg-danger'}`;
  }

  // ── Group addresses table ─────────────────────────────────────────────────────
  let configuredGAs = [];
  let sortCol = null;
  let sortDir = 1; // 1 = asc, -1 = desc

  function sortedGAs() {
    if (!sortCol) return configuredGAs.slice();
    return configuredGAs.slice().sort((a, b) => {
      const av = (a[sortCol] || '').toLowerCase();
      const bv = (b[sortCol] || '').toLowerCase();
      return av < bv ? -sortDir : av > bv ? sortDir : 0;
    });
  }

  function renderGATable(addresses) {
    configuredGAs = addresses;
    const gaBody = document.getElementById('ga-body');
    const sorted = sortedGAs();
    if (!sorted.length) {
      gaBody.innerHTML = '<tr><td colspan="6" class="text-center empty-msg p-3">No group addresses configured.</td></tr>';
      return;
    }
    gaBody.innerHTML = sorted.map((ga) => `
      <tr>
        <td><code>${escHtml(ga.address)}</code></td>
        <td>${escHtml(ga.name || '')}</td>
        <td><small>${escHtml(ga.dpt || '')}</small></td>
        <td><small class="text-muted">${escHtml(ga.comment || '')}</small></td>
        <td><strong>${escHtml(ga.lastValue !== undefined && ga.lastValue !== null ? formatValue(ga.lastValue, ga.dpt) : '–')}</strong></td>
        <td class="text-end text-nowrap">
          <button class="btn btn-sm btn-outline-secondary btn-edit-ga me-1" data-address="${escHtml(ga.address)}" aria-label="Edit"><i class="bi bi-pencil-fill"></i></button>
          <button class="btn btn-sm btn-outline-danger btn-delete-ga"       data-address="${escHtml(ga.address)}" aria-label="Delete"><i class="bi bi-trash-fill"></i></button>
        </td>
      </tr>
    `).join('');
  }

  // ── GA table column sorting ───────────────────────────────────────────────────
  function updateSortIndicators() {
    document.querySelectorAll('#ga-table thead th[data-sort]').forEach((th) => {
      if (th.dataset.sort === sortCol) {
        th.dataset.dir = sortDir === 1 ? 'asc' : 'desc';
      } else {
        delete th.dataset.dir;
      }
    });
  }

  document.querySelectorAll('#ga-table thead th[data-sort]').forEach((th) => {
    th.addEventListener('click', () => {
      const col = th.dataset.sort;
      if (sortCol === col) { sortDir *= -1; }
      else { sortCol = col; sortDir = 1; }
      updateSortIndicators();
      renderGATable(configuredGAs);
    });
  });

  /** Update the Last Value cell for a GA row without re-rendering the whole table. */
  function updateGALastValue(entry) {
    // Find the row whose first cell contains the matching address
    const rows = document.getElementById('ga-body').rows;
    for (const row of rows) {
      const codeEl = row.cells[0] && row.cells[0].querySelector('code');
      if (codeEl && codeEl.textContent === entry.address) {
        // Update the in-memory GA object so modal edits reflect current DPT
        const ga = configuredGAs.find((g) => g.address === entry.address);
        if (ga) ga.lastValue = entry.value;
        // Update the cell (column index 4)
        const cell = row.cells[4];
        if (cell) cell.innerHTML = `<strong>${escHtml(formatValue(entry.value, entry.dpt))}</strong>`;
        break;
      }
    }
  }

  // Delegate edit / delete clicks in the GA table
  document.getElementById('ga-body').addEventListener('click', (e) => {
    const editBtn   = e.target.closest('.btn-edit-ga');
    const deleteBtn = e.target.closest('.btn-delete-ga');
    if (editBtn)   openModal(editBtn.dataset.address, true);
    if (deleteBtn) deleteGA(deleteBtn.dataset.address);
  });

  function deleteGA(address) {
    if (!confirm(`Remove group address ${address} from the configuration?`)) return;
    fetch('/api/groupaddresses/' + encodeURIComponent(address), { method: 'DELETE' })
      .catch((err) => console.error('Delete GA failed:', err));
  }

  // ── Add / Edit modal ──────────────────────────────────────────────────────────
  const gaModal     = new bootstrap.Modal(document.getElementById('gaModal'));
  const addrInput   = document.getElementById('ga-address');
  const nameInput   = document.getElementById('ga-name');
  const dptInput    = document.getElementById('ga-dpt');
  const commentInput = document.getElementById('ga-comment');
  const formError   = document.getElementById('ga-form-error');

  function openModal(prefillAddress, editMode) {
    formError.classList.add('d-none');
    const ga = editMode ? configuredGAs.find((g) => g.address === prefillAddress) : null;
    document.getElementById('gaModalTitle').textContent = ga ? 'Edit Group Address' : 'Add Group Address';
    addrInput.value    = prefillAddress || '';
    addrInput.readOnly = Boolean(ga);
    nameInput.value    = ga ? (ga.name    || '') : '';
    dptInput.value     = ga ? (ga.dpt     || '') : '';
    commentInput.value = ga ? (ga.comment || '') : '';
    gaModal.show();
    if (!addrInput.readOnly) addrInput.focus();
  }

  document.getElementById('btn-add-ga').addEventListener('click', () => openModal(''));

  // ── ETS XML Import ────────────────────────────────────────────────────────────
  /**
   * Convert an ETS DPT string such as "DPST-1-8" or "DPT-1" to the internal
   * dotted format used by this app ("1.008" or "1.001").
   */
  function etsDptToDotted(raw) {
    if (!raw) return '';
    const dpst = raw.match(/^DPST-(\d+)-(\d+)$/i);
    if (dpst) return `${dpst[1]}.${dpst[2].padStart(3, '0')}`;
    const dpt  = raw.match(/^DPT-(\d+)$/i);
    if (dpt)  return `${dpt[1]}.001`;
    return raw; // already in another format – pass through
  }

  /** Parse an ETS GroupAddress-Export XML string and return an array of GA objects. */
  function parseETSXml(xmlText) {
    const parser = new DOMParser();
    const doc = parser.parseFromString(xmlText, 'text/xml');
    const parseErr = doc.querySelector('parsererror');
    if (parseErr) throw new Error('Invalid XML: ' + (parseErr.textContent.trim().split('\n')[0] || 'parse error'));
    const results = [];
    doc.querySelectorAll('GroupAddress').forEach((el) => {
      const address = el.getAttribute('Address') || '';
      if (!address) return;
      results.push({
        address,
        name:    el.getAttribute('Name')    || '',
        dpt:     etsDptToDotted(el.getAttribute('DPTs') || ''),
        comment: '',
      });
    });
    return results;
  }

  const importFileInput = document.getElementById('ga-import-file');

  document.getElementById('btn-import-ga').addEventListener('click', () => {
    importFileInput.value = '';
    importFileInput.click();
  });

  importFileInput.addEventListener('change', () => {
    const file = importFileInput.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      let addresses;
      try {
        addresses = parseETSXml(ev.target.result);
      } catch (err) {
        alert('Import failed: ' + err.message);
        return;
      }
      if (!addresses.length) { alert('No group addresses found in the file.'); return; }
      fetch('/api/groupaddresses/import', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ addresses }),
      })
        .then((r) => { if (!r.ok) throw new Error(r.statusText); return r.json(); })
        .then((data) => alert(`Import complete: ${data.added} added, ${data.updated} updated.`))
        .catch((err) => alert('Import failed: ' + err.message));
    };
    reader.readAsText(file);
  });

  document.getElementById('btn-save-ga').addEventListener('click', () => {
    const address = addrInput.value.trim();
    if (!address) {
      formError.textContent = 'Address is required.';
      formError.classList.remove('d-none');
      return;
    }
    fetch('/api/groupaddresses', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({
        address,
        name:    nameInput.value.trim(),
        dpt:     dptInput.value.trim(),
        comment: commentInput.value.trim(),
      }),
    })
      .then((r) => { if (!r.ok) throw new Error(r.statusText); return r.json(); })
      .then(() => gaModal.hide())
      .catch((err) => {
        formError.textContent = 'Save failed: ' + err.message;
        formError.classList.remove('d-none');
      });
  });

  // ── Socket events ─────────────────────────────────────────────────────────────
  socket.on('init', (log) => {
    log.forEach((entry) => { appendRow(entry); updateCounters(entry); });
  });

  socket.on('traffic', (entry) => {
    appendRow(entry);
    updateCounters(entry);
    if (entry.configured !== false) updateGALastValue(entry);
  });

  socket.on('status', ({ service, connected }) => updateBadge(service, connected));

  socket.on('groupaddresses', renderGATable);

  // ── Dark mode toggle ──────────────────────────────────────────────────────────
  (function initDarkModeButton() {
    const html     = document.documentElement;
    const btn      = document.getElementById('btn-dark-mode');
    const icon     = document.getElementById('dark-mode-icon');

    function applyTheme(theme) {
      html.setAttribute('data-bs-theme', theme);
      icon.className = theme === 'dark' ? 'bi bi-sun-fill' : 'bi bi-moon-fill';
      localStorage.setItem('theme', theme);
    }

    // Sync icon with the already-applied theme (set by the inline script)
    applyTheme(html.getAttribute('data-bs-theme') || 'light');

    btn.addEventListener('click', () => {
      applyTheme(html.getAttribute('data-bs-theme') === 'dark' ? 'light' : 'dark');
    });
  })();

  // ── PWA service worker ────────────────────────────────────────────────────────
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').catch((err) => {
      console.warn('Service worker registration failed:', err);
    });
  }

  // ── Clear button ──────────────────────────────────────────────────────────────
  document.getElementById('btn-clear').addEventListener('click', () => {
    tbody.innerHTML = '<tr><td colspan="6" class="text-center empty-msg p-3">Log cleared.</td></tr>';
    hasRows = false;
    total = knx2mqtt = mqtt2knx = 0;
    document.getElementById('cnt-total').textContent    = '0';
    document.getElementById('cnt-knx2mqtt').textContent = '0';
    document.getElementById('cnt-mqtt2knx').textContent = '0';
    document.getElementById('cnt-last-val').textContent = '–';
  });
</script>
</body>
</html>
